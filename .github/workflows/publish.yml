name: Publish to GitHub Packages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt
      - name: Test
        run: sbt "+test"
      - name: Publish
        run: sbt "+publish"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
